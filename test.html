<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test</title>
<style>
body{font-family:sans-serif;padding:20px;max-width:500px;margin:0 auto}
.box{background:#f5f5f5;border-radius:8px;padding:16px;margin-bottom:12px}
.ok{color:#0F6E56;font-weight:600}
.fail{color:#A32D2D;font-weight:600}
.pending{color:#854F0B}
input{width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:6px;font-size:16px;box-sizing:border-box}
button{width:100%;padding:12px;background:#1D9E75;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin-top:8px}
#log{white-space:pre-wrap;font-size:13px;font-family:monospace;background:#1a1a1a;color:#fff;padding:12px;border-radius:6px;max-height:300px;overflow-y:auto}
</style>
</head>
<body>
<h2>Firebase Diagnostic</h2>

<div class="box">
  <div id="sdk-status" class="pending">Checking Firebase SDK...</div>
  <div id="auth-status" class="pending">Checking Auth...</div>
  <div id="domain-status" class="pending">Checking authorised domains...</div>
</div>

<div class="box">
  <input type="email" id="email" placeholder="Your email" autocapitalize="off" autocorrect="off">
  <input type="password" id="password" placeholder="Your password">
  <button onclick="testLogin()">Test Login</button>
  <div id="login-result" style="margin-top:10px;font-size:14px"></div>
</div>

<div class="box">
  <div style="font-size:12px;color:#666;margin-bottom:6px">Console log</div>
  <div id="log"></div>
</div>

<script>
function log(msg, type){
  const el = document.getElementById('log');
  const color = type==='ok'?'#9FE1CB':type==='fail'?'#F09595':'#FAC775';
  el.innerHTML += `<span style="color:${color}">${new Date().toLocaleTimeString()} ${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}

log('Page loaded', 'ok');
log('Checking for Firebase SDK...');
</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"
  onload="log('firebase-app loaded ✓','ok'); checkSDK();"
  onerror="log('firebase-app FAILED TO LOAD — network/CSP issue','fail'); document.getElementById('sdk-status').innerHTML='<span class=fail>SDK failed to load — blocked by network or browser</span>'">
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"
  onload="log('firebase-auth loaded ✓','ok')"
  onerror="log('firebase-auth FAILED','fail')">
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBrfoM6xZ_SwsyhuRkcmN9oRXLrTUE_yUA",
  authDomain: "fittracker-ee9ea.firebaseapp.com",
  projectId: "fittracker-ee9ea",
  storageBucket: "fittracker-ee9ea.firebasestorage.app",
  messagingSenderId: "639006954504",
  appId: "1:639006954504:web:27bdb758731d4c0bf56dbd"
};

function checkSDK(){
  if(typeof firebase === 'undefined'){
    document.getElementById('sdk-status').innerHTML = '<span class="fail">Firebase SDK not available</span>';
    log('firebase global undefined after load!', 'fail');
    return;
  }
  document.getElementById('sdk-status').innerHTML = '<span class="ok">Firebase SDK loaded ✓</span>';
  log('Firebase SDK available', 'ok');

  try {
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    document.getElementById('auth-status').innerHTML = '<span class="ok">Firebase Auth initialised ✓</span>';
    log('Auth init OK', 'ok');

    const domain = window.location.hostname;
    document.getElementById('domain-status').innerHTML =
      `Current domain: <strong>${domain}</strong> — must be in Firebase Auth authorised domains list`;
    log('Current domain: ' + domain, 'pending');

    auth.onAuthStateChanged(user => {
      if(user){
        log('Already signed in as: ' + user.email, 'ok');
        document.getElementById('login-result').innerHTML =
          '<span style="color:#0F6E56">Already signed in as '+user.email+'</span>';
      } else {
        log('No user signed in', 'pending');
      }
    });
  } catch(e) {
    document.getElementById('auth-status').innerHTML = '<span class="fail">Init failed: '+e.message+'</span>';
    log('Init error: ' + e.code + ' — ' + e.message, 'fail');
  }
}

async function testLogin(){
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const result = document.getElementById('login-result');
  if(!email||!pass){ result.textContent='Enter email and password'; return; }
  if(typeof firebase==='undefined'){ result.textContent='Firebase not loaded'; return; }

  result.innerHTML = '<span style="color:#854F0B">Attempting login...</span>';
  log('Attempting login for: '+email, 'pending');

  try {
    const auth = firebase.auth();
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    result.innerHTML = '<span style="color:#0F6E56">SUCCESS ✓ Logged in as: '+cred.user.email+'</span>';
    log('LOGIN SUCCESS: '+cred.user.email, 'ok');
  } catch(e) {
    result.innerHTML = '<span style="color:#A32D2D">FAILED: '+e.code+' — '+e.message+'</span>';
    log('LOGIN FAILED: '+e.code+' — '+e.message, 'fail');
  }
}

// Fallback if SDK never loads
setTimeout(()=>{
  if(typeof firebase==='undefined'){
    log('TIMEOUT: Firebase never loaded after 5s', 'fail');
    document.getElementById('sdk-status').innerHTML =
      '<span class="fail">Firebase SDK timed out — blocked by browser, network, or Content Security Policy</span>';
  }
}, 5000);
</script>
</body>
</html>
